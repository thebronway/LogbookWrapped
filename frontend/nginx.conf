server {
    listen 80;
    server_name localhost;

    # Where Nginx should look for files
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is the magic line! 
        # 1. Try to find the exact file requested ($uri)
        # 2. Try to find a directory with that name ($uri/)
        # 3. If neither exists, serve index.html instead!
        try_files $uri $uri/ /index.html;
    }
}